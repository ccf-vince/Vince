<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Star Wars Style Intro</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: #feda4a;
    font-family: 'Arial', sans-serif;
}

.star-wars {
    display: flex;
    justify-content: center;
    position: relative;
    height: 100vh;
    perspective: 400px;
    text-align: center;
}

.crawl {
    position: relative;
    top: 100%;
    transform-origin: 50% 100%;
    animation: crawl 20s linear infinite;
    width: 60%;
    font-size: 24px;
    line-height: 1.5;
}

@keyframes crawl {
    0% {
        top: 100%;
        transform: rotateX(20deg) translateZ(0);
    }
    100% {
        top: -200%;
        transform: rotateX(25deg) translateZ(-300px);
    }
}

.title {
    font-size: 50px;
    margin-bottom: 40px;
}
</style>

</head>

<body>

<div class="star-wars">
    <div class="crawl">
        <div class="title">IMAGE CLASSIFICATION</div>

        <p>
        在一個由資料構成的宇宙中，<br>
        電腦學會了「看見」世界。
        </p>

        <p>
        透過影像預處理，它能清除雜訊、強化細節；<br>
        透過特徵提取，它理解顏色、形狀與紋理。
        </p>

        <p>
        卷積神經網路（CNN）崛起，<br>
        以多層結構解析影像，<br>
        從邊緣到完整物體，一步步揭開真相。
        </p>

        <p>
        與此同時，深度信念網路（DBN）<br>
        嘗試以不同方式理解世界，<br>
        但在影像領域逐漸被超越。
        </p>

        <p>
        在這場 AI 的進化之戰中，<br>
        CNN 成為主宰影像辨識的力量……
        </p>

    </div>
</div>

</body>
</html>
